<!DOCTYPE html>
<html lang="en">

<head>

<body>
    <h1>Carausal</h1>

    <div class="carausal-container">
        <div class="display-container">
            <button onclick="prevClick()" class="prev-btn">prev</button>
            <img id="DisplayImg" class="display-img"
                src="https://images.unsplash.com/photo-1499678329028-101435549a4e?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" />

        </div>
        <div class="thumbnail">

            <img src="https://images.unsplash.com/photo-1499678329028-101435549a4e?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                alt="" class="thumb active">
            <img src="https://images.unsplash.com/photo-1491466424936-e304919aada7?q=80&w=869&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"

                alt="" class="thumb">
            <img src="https://images.unsplash.com/photo-1431440869543-efaf3388c585?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                alt="" class="thumb">
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
